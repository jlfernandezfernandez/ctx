name: Publish daily article

on:
  schedule:
    # 04:30 UTC Mon-Fri = 06:30 Madrid (summer) / 05:30 (winter)
    - cron: "30 4 * * 1-5"
  workflow_dispatch:
    inputs:
      pr_number:
        description: Existing article PR to re-review (skips the writer)
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install generator
        run: pip install ./generator

      - name: Writer — pick topic, write article, open PR
        id: writer
        if: inputs.pr_number == ''
        env:
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_WRITER_MODEL: ${{ vars.LLM_WRITER_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OUTPUT_DIR: site/src/content/blog
          SITE_URL: https://${{ github.repository_owner }}.github.io/ctx
        run: generate-article

      - name: Reviewer — review PR, fix if needed, merge or leave open
        if: inputs.pr_number != '' || steps.writer.outputs.pr_number != ''
        env:
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_REVIEWER_MODEL: ${{ vars.LLM_REVIEWER_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number || steps.writer.outputs.pr_number }}
          SITE_URL: https://${{ github.repository_owner }}.github.io/ctx
        run: review-article
