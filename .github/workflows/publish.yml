name: Publish daily article

on:
  schedule:
    # 04:30 UTC Mon-Fri = 06:30 Madrid (summer) / 05:30 (winter)
    - cron: "30 4 * * 1-5"
  workflow_dispatch:
    inputs:
      pr_number:
        description: Existing article PR to re-review (skips the writer)
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install generator
        run: pip install ./generator

      - name: Publish pipeline — draft PR, review loop, merge or leave open
        env:
          # Providers
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OPENROUTER_BASE_URL: ${{ vars.OPENROUTER_BASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Agents / capabilities
          AGENT_WRITER_PROVIDER: ${{ vars.AGENT_WRITER_PROVIDER }}
          AGENT_WRITER_MODEL: ${{ vars.AGENT_WRITER_MODEL }}
          AGENT_WRITER_JSON_PROVIDER: ${{ vars.AGENT_WRITER_JSON_PROVIDER }}
          AGENT_WRITER_JSON_MODEL: ${{ vars.AGENT_WRITER_JSON_MODEL }}
          AGENT_REVIEWER_PROVIDER: ${{ vars.AGENT_REVIEWER_PROVIDER }}
          AGENT_REVIEWER_MODEL: ${{ vars.AGENT_REVIEWER_MODEL }}
          MAX_REVIEW_ROUNDS: ${{ vars.MAX_REVIEW_ROUNDS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          SITE_URL: https://${{ github.repository_owner }}.github.io/ctx
        run: publish-article
