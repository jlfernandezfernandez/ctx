name: Curate proposed topic

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to curate
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: triage-topic-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  triage:
    if: contains(github.event.issue.labels.*.name, 'triage')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install topic curator
        run: pip install ./generator

      - name: Curate proposed topic
        env:
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_TRIAGE_MODEL: ${{ vars.LLM_TRIAGE_MODEL }}
          TRIAGE_ISSUE_NUMBER: ${{ inputs.issue_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: triage-topic
