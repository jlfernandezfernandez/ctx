name: Review article

on:
  pull_request:
    types: [labeled]
  workflow_run:
    workflows: ["Generate daily article"]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'needs-review')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install generator
        run: pip install ./generator

      - name: Find and review PR
        env:
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_REVIEWER_MODEL: ${{ vars.LLM_REVIEWER_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SITE_URL: https://${{ github.repository_owner }}.github.io/ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            PR_NUMBER=$(gh pr list --state open --label "needs-review" --json number --jq '.[0].number')
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No PR with needs-review label found."
            exit 0
          fi
          echo "Reviewing PR #$PR_NUMBER"
          PR_NUMBER=$PR_NUMBER review-article