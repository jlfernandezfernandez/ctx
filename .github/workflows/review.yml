name: Review article

on:
  pull_request:
    types: [labeled]
  workflow_run:
    workflows: ["Generate daily article"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install generator
        run: pip install ./generator

      - name: Find PR to review
        id: find-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            echo "pr_number=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            PR_NUMBER=$(gh pr list --state open --label "needs-review" --json number --jq '.[0].number')
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          fi

      - name: Review article
        if: steps.find-pr.outputs.pr_number != '' && steps.find-pr.outputs.pr_number != 'null'
        env:
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_REVIEWER_MODEL: ${{ vars.LLM_REVIEWER_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
          SITE_URL: https://${{ github.repository_owner }}.github.io/ctx
        run: review-article